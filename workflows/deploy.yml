name: Build, Push to Docker Hub, and Deploy to Azure

on:
  push:
    branches:
      - main  # Triggers the pipeline only when code is merged into main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull down the repository code from GitHub
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. Log in to your Docker Hub account securely
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 3. Build the image and push it up to Docker Hub
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        # Replace 'your-dockerhub-username' and 'your-repo-name' with your actual account info
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/logistics-grid-app:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/logistics-grid-app:${{ github.sha }}

    # 4. Authenticate directly with Azure using your corporate Service Principal
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # 5. Signal Azure Container Apps to pull the newly updated image instantly
    - name: Deploy to Azure Container App
      uses: azure/CLI@v2
      with:
        inlineScript: |
          az containerapp update \
            --name your-container-app-name \
            --resource-group your-resource-group-name \
            --image docker.io/${{ secrets.DOCKERHUB_USERNAME }}/logistics-grid-app:${{ github.sha }}
